version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.5.1 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - NODE_OPTIONS=--max-old-space-size=4096 pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
